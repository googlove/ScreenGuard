name: Build ScreenGuard APK

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Debug APK
      run: gradle assembleDebug --stacktrace --info
      env:
        GRADLE_OPTS: -Xmx2048m

    - name: Build Release APK (optional)
      run: gradle assembleRelease --stacktrace --info
      continue-on-error: true
      env:
        GRADLE_OPTS: -Xmx2048m

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: ScreenGuard-Debug-APK
        path: build/outputs/apk/debug/*.apk
        if-no-files-found: warn
        retention-days: 30

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ScreenGuard-Release-APK
        path: build/outputs/apk/release/*.apk
        if-no-files-found: ignore
        retention-days: 30

    - name: Generate Build Report
      if: always()
      run: |
        echo "## Build Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Build Date:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "**Gradle Version:** 7.6" >> $GITHUB_STEP_SUMMARY
        echo "**Java Version:** 11" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY

    - name: Notify on Success
      if: success()
      run: echo "✅ Build succeeded! APKs ready for download."

    - name: Notify on Failure
      if: failure()
      run: echo "❌ Build failed! Check logs above."