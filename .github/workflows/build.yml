name: Build ScreenGuard APK

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Clear Gradle Cache
      run: |
        rm -rf ~/.gradle/caches
        rm -rf ~/.gradle/wrapper

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.4.2'

    - name: Build Debug APK
      run: gradle clean assembleDebug --no-daemon --stacktrace
      env:
        GRADLE_OPTS: -Xmx1024m

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: ScreenGuard-Debug-APK
        path: build/outputs/apk/debug/*.apk
        if-no-files-found: warn
        retention-days: 30

    - name: Generate Build Report
      if: always()
      run: |
        echo "## Build Report" >> $GITHUB_STEP_SUMMARY
        echo "**Status:** $([ $? -eq 0 ] && echo '✅ Success' || echo '❌ Failed')" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY

    - name: Notify on Failure
      if: failure()
      run: echo "❌ Build failed! Check logs above."