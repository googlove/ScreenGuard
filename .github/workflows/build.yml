name: Build ScreenGuard APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '7.6'

    - name: Patch project files
      run: |
        # Додаємо репозиторії Google, щоб система знала, звідки качати Android-плагіни
        echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }" > temp_settings.gradle
        cat settings.gradle >> temp_settings.gradle
        mv temp_settings.gradle settings.gradle
        
        # Автоматично дописуємо відсутню версію плагінів у build.gradle
        sed -i "s/id 'com.android.application'/id 'com.android.application' version '7.4.2'/g" build.gradle
        sed -i 's/id "com.android.application"/id "com.android.application" version "7.4.2"/g' build.gradle
        sed -i "s/id 'org.jetbrains.kotlin.android'/id 'org.jetbrains.kotlin.android' version '1.8.0'/g" build.gradle
        sed -i 's/id "org.jetbrains.kotlin.android"/id "org.jetbrains.kotlin.android" version "1.8.0"/g' build.gradle
        
        # Захист від помилок на випадок, якщо версія десь була вказана
        sed -i "s/version '7.4.2' version '7.4.2'/version '7.4.2'/g" build.gradle
        sed -i 's/version "7.4.2" version "7.4.2"/version "7.4.2"/g' build.gradle

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ScreenGuard-APK
        # Збираємо всі APK файли, де б вони не згенерувалися
        path: '**/*.apk'
